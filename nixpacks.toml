[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node -e \"const h=require('http'),f=require('fs'),p=require('path');h.createServer((q,r)=>{let u=q.url.split('?')[0];if(u==='/')u='/index.html';let fp=p.join('dist',u);if(!f.existsSync(fp))fp=p.join('dist','index.html');const ext=p.extname(fp);const mime={'html':'text/html','css':'text/css','js':'application/javascript','svg':'image/svg+xml','png':'image/png','ico':'image/x-icon'};r.setHeader('Content-Type',mime[ext.slice(1)]||'text/plain');f.createReadStream(fp).pipe(r)}).listen(process.env.PORT||3000,()=>console.log('OK'))\""
